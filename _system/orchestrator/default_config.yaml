# Orchestrator default config.
# See _system/orchestrator/design.md for schema documentation.
# Per-product overrides go in config-overrides.yaml (generated by the
# product definition agent); they layer on top of these defaults via deep merge.

prompt_versioning:
  # Warn + record `dirty: true` on uncommitted prompt files (default).
  # Flip to true for prod/regulated runs to refuse dispatch instead.
  strict: false

context_budgets:
  claude:
    max_input_tokens: 180000
    reserved_for_output: 30000
  gemini:
    max_input_tokens: 900000
    reserved_for_output: 100000
  gpt:
    max_input_tokens: 120000
    reserved_for_output: 30000

retry:
  max_attempts: 5
  backoff_seconds: [2, 4, 8, 16, 32]
  malformed_response_retries: 2

validation:
  structural: always
  content:
    input_coverage: true
    consistency: false
    hallucination_flag: true
    scope_compliance: true

telemetry:
  distinct_id: pm_os_user
  backend: jsonl
